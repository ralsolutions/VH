<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vertical Horizonz · Dual Qualification Rope Access Pathway</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:#0a0a0a;
      --bg:#121212;
      --panel:#1a1a1a;
      --raised:#252525;
      --border:#333;
      --text:#f5f5f5;
      --muted:#a0a0a0;
      --dim:#666;
      --accent:#00d4ff;
      --accent-dark:#0099cc;
      --success:#22c55e;
      --danger:#ef4444;
      --warn:#eab308;
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    html, body, #root { height:100%; }
    body {
      overflow-x:hidden;
      font-family:"Space Grotesk","JetBrains Mono",sans-serif;
      background:var(--bg-deep);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
    }

    button, input, textarea, select { font:inherit; }
    button { border:none; }
    input:focus, textarea:focus, select:focus {
      outline:none;
      border-color:var(--accent) !important;
      box-shadow:0 0 0 2px rgba(0,212,255,.15);
    }

    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

    .app { min-height:100vh; background:var(--bg-deep); }
    .header { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); padding:20px 24px; display:flex; align-items:center; gap:20px; }
    .logo { width:40px; height:40px; background:var(--text); border-radius:4px; display:flex; align-items:center; justify-content:center; font:800 16px "Space Grotesk"; color:var(--bg); flex-shrink:0; }
    .header h1 { font:800 18px "Space Grotesk"; letter-spacing:.5px; }
    .header p { margin-top:2px; color:var(--dim); font:600 10px "JetBrains Mono"; text-transform:uppercase; letter-spacing:1px; }
    
    .hero { padding:60px 24px; text-align:center; background:linear-gradient(135deg, var(--bg) 0%, var(--panel) 100%); }
    .hero h1 { font:800 42px "Space Grotesk"; margin-bottom:16px; letter-spacing:-.5px; }
    .hero p { color:var(--muted); font-size:16px; line-height:1.6; max-width:700px; margin:0 auto 32px; }
    
    .section { padding:48px 24px; max-width:1000px; margin:0 auto; }
    .section h2 { font:800 28px "Space Grotesk"; margin-bottom:24px; letter-spacing:-.3px; }
    .section p { color:var(--muted); line-height:1.7; margin-bottom:16px; font-size:15px; }
    
    .problem, .solution { margin-bottom:32px; padding:24px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
    .problem h3 { color:var(--danger); font:700 16px "Space Grotesk"; margin-bottom:12px; display:flex; gap:8px; align-items:center; }
    .solution h3 { color:var(--success); font:700 16px "Space Grotesk"; margin-bottom:12px; display:flex; gap:8px; align-items:center; }
    .problem ul, .solution ul { margin:12px 0 0 24px; color:var(--muted); font-size:14px; }
    .problem li, .solution li { margin-bottom:8px; }

    .cta-btn { background:var(--accent); color:var(--bg); padding:14px 28px; border-radius:6px; font:800 13px "JetBrains Mono"; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; transition:all .2s; }
    .cta-btn:hover { background:var(--accent-dark); box-shadow:0 0 30px rgba(0,212,255,.3); transform:translateY(-2px); }

    .overlay { position:fixed; inset:0; z-index:1000; background:rgba(10,10,10,.92); backdrop-filter:blur(8px); display:grid; place-items:center; padding:20px; }
    .modal { width:100%; max-width:650px; max-height:90vh; overflow:auto; background:var(--panel); border:1px solid var(--border); border-radius:10px; animation:fadeIn .2s ease-out; }
    .modal-head { padding:24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    .modal-head h2 { font:800 22px "Space Grotesk"; }
    .modal-head small { color:var(--dim); font:600 10px "JetBrains Mono"; text-transform:uppercase; }
    .close { background:transparent; color:var(--muted); cursor:pointer; font-size:28px; line-height:1; }
    .modal-body { padding:24px; }

    .progress { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:24px; }
    .progress div { height:100%; background:var(--accent); transition:width .2s ease; }

    .question { margin-bottom:28px; }
    .question h3 { font:700 15px "Space Grotesk"; margin-bottom:12px; display:flex; gap:8px; align-items:center; }
    .options { display:flex; flex-direction:column; gap:10px; }
    .option { padding:12px 14px; background:var(--raised); border:1px solid var(--border); border-radius:6px; color:var(--muted); cursor:pointer; transition:all .15s; text-align:left; }
    .option:hover { background:var(--border); color:var(--text); }
    .option.selected { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }

    .legend { padding:12px 14px; background:rgba(0,212,255,.08); border-left:3px solid var(--accent); border-radius:4px; color:var(--muted); font-size:13px; line-height:1.5; margin-bottom:16px; }
    .legend.warn { background:rgba(234,179,8,.08); border-color:var(--warn); color:#e6d156; }
    .legend.danger { background:rgba(239,68,68,.08); border-color:var(--danger); color:#f8a5a5; }

    .result { text-align:center; padding:32px; }
    .result-icon { font-size:60px; margin-bottom:16px; animation:pulse 2s infinite; }
    .result h2 { font:800 24px "Space Grotesk"; margin-bottom:12px; }
    .result p { color:var(--muted); font-size:14px; line-height:1.6; margin-bottom:24px; }

    .breakdown { background:var(--raised); border:1px solid var(--border); border-radius:8px; padding:20px; margin:24px 0; text-align:left; }
    .breakdown-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
    .breakdown-row:last-child { border-bottom:none; }
    .breakdown-label { display:flex; gap:6px; align-items:center; }

    .contact-block { background:var(--raised); border:2px solid var(--accent); border-radius:8px; padding:20px; margin:24px 0; text-align:center; }
    .contact-block p { color:var(--muted); font-size:13px; margin-bottom:12px; }
    .contact-email { font:700 15px "JetBrains Mono"; color:var(--accent); word-break:break-all; }

    .btn-group { display:flex; gap:12px; margin-top:24px; justify-content:center; flex-wrap:wrap; }
    .btn { padding:12px 20px; border-radius:6px; font:700 12px "JetBrains Mono"; text-transform:uppercase; cursor:pointer; transition:all .2s; border:1px solid var(--border); }
    .btn.primary { background:var(--accent); color:var(--bg); border-color:var(--accent); }
    .btn.primary:hover { background:var(--accent-dark); }
    .btn.secondary { background:transparent; color:var(--muted); }
    .btn.secondary:hover { background:var(--raised); color:var(--text); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    .footer { padding:40px 24px; text-align:center; color:var(--dim); font-size:12px; border-top:1px solid var(--border); }

    @media (max-width:640px) {
      .hero h1 { font-size:32px; }
      .hero p { font-size:14px; }
      .section h2 { font-size:22px; }
      .header { flex-direction:column; text-align:center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const questions = [
      {
        id: "citizenship",
        emoji: "🛂",
        text: "Are you a New Zealand citizen or permanent resident?",
        options: [
          ["Yes, citizen or PR", "yes"],
          ["No, on visa", "no"],
          ["Applying for residency", "applying"]
        ]
      },
      {
        id: "weight",
        emoji: "⚖️",
        text: "Total working weight (in kg)?",
        options: [
          ["Under 70kg", "under70"],
          ["70-90kg", "70-90"],
          ["90-110kg", "90-110"],
          ["110-120kg", "110-120"],
          ["Over 120kg", "over120"]
        ]
      },
      {
        id: "age",
        emoji: "🎂",
        text: "Age range?",
        options: [
          ["18 - 25", "18-25"],
          ["25 - 30", "25-30"],
          ["30 - 35", "30-35"],
          ["35 - 40", "35-40"],
          ["40+", "40+"]
        ]
      },
      {
        id: "trade",
        emoji: "🔧",
        text: "Trade or construction experience?",
        options: [
          ["None", "none"],
          ["Some (1-2 years)", "some"],
          ["Solid (5+ years)", "pro"]
        ]
      },
      {
        id: "climbing",
        emoji: "🧗",
        text: "Climbing or height-work experience?",
        options: [
          ["None", "none"],
          ["Few times", "few"],
          ["Regular (few times/month)", "regular"],
          ["Often", "often"]
        ]
      },
      {
        id: "fitness",
        emoji: "💪",
        text: "Current fitness level?",
        options: [
          ["Low (sedentary)", "low"],
          ["Medium (some activity)", "medium"],
          ["High (regular training 3+x/week)", "high"]
        ]
      },
      {
        id: "teamwork",
        emoji: "🤝",
        text: "How do you feel about teamwork?",
        options: [
          ["Prefer working alone", "alone"],
          ["Can work in teams, no problem", "ok"],
          ["Teamwork is the dream work", "great"]
        ]
      }
    ];

    function evaluateProfile(answers) {
      const isCitizenOrPR = answers.citizenship === "yes";
      const weight = answers.weight;
      const age = answers.age;
      const trade = answers.trade;
      const climbing = answers.climbing;
      const fitness = answers.fitness;
      const teamwork = answers.teamwork;

      const breakdown = {
        age: { label: "Age", value: age, status: "ℹ️" },
        trade: { label: "Trade", value: trade, status: trade === "none" ? "⚠️" : "✅" },
        climbing: { label: "Climbing", value: climbing, status: climbing === "none" ? "❌" : climbing === "few" ? "⚠️" : "✅" },
        fitness: { label: "Fitness", value: fitness, status: fitness === "low" ? "❌" : fitness === "medium" ? "⚠️" : "✅" },
        teamwork: { label: "Teamwork", value: teamwork, status: teamwork === "alone" ? "❌" : teamwork === "ok" ? "⚠️" : "✅" },
        weight: { label: "Weight", value: weight, status: weight === "over120" ? "❌" : weight === "110-120" ? "⚠️" : "✅" }
      };

      const legends = [];

      // BLOQUEADOR 1: No PR/Citizenship
      if (!isCitizenOrPR) {
        return {
          status: "blocked",
          title: "We'd Love to Have You, But...",
          message: "The Dual Qualification Pathway is currently available for NZ citizens and permanent residents only.",
          breakdown,
          legends: [{
            type: "danger",
            text: "🛂 This programme is designed for NZ citizens and permanent residents. If you're on a visa pathway, consider connecting with immigration specialists or explore other training options."
          }]
        };
      }

      // BLOQUEADOR 2: Weight > 120kg
      if (weight === "over120") {
        return {
          status: "blocked",
          title: "Equipment Limitations",
          message: "Due to equipment limitations, we are unable to accommodate individuals with a total working weight exceeding 120 kg.",
          breakdown,
          legends: [{
            type: "danger",
            text: "⚖️ Our safety systems and harnesses have weight capacity limits. We cannot compromise on safety."
          }]
        };
      }

      // Weight warning
      if (weight === "90-110" || weight === "110-120") {
        legends.push({
          type: "warn",
          text: "⚖️ You're in the higher weight range. You'll need a strong fitness level. Equipment has limits—staying fit helps everything."
        });
      }

      // Age + sedentary blocker (40+ + no trade + low fitness)
      if (age === "40+" && trade === "none" && fitness === "low") {
        return {
          status: "blocked",
          title: "Not the Right Time",
          message: "Rope access at 40+ without trade background and low fitness is an extremely difficult combination.",
          breakdown,
          legends: [{
            type: "danger",
            text: "🎂💪 At 40+, rope access is physically demanding. Without trade background and low fitness, the odds are heavily stacked against you. Consider building fitness first (6 months of solid training)."
          }]
        };
      }

      // TEAMWORK BLOCKER (but can pass training)
      if (teamwork === "alone") {
        legends.push({
          type: "danger",
          text: "🤝 CRITICAL: Rope access is 100% team-based work. You might pass the training technically, but the industry requires constant collaboration, communication, and trust. Solo climbing mindset won't work on commercial job sites. Safety depends on teamwork. You MUST be willing to work closely with others and communicate constantly."
        });
      }

      // Now build the positive cases
      let resultStatus = "strong";
      let resultTitle = "🎉 Strong Profile - You're Ready!";
      let resultMessage = "Your profile shows you have the foundation to excel in the Dual Qualification Pathway.";

      const isYoung = age === "18-25" || age === "25-30";
      const isMiddleAge = age === "30-35" || age === "35-40";
      const isOld = age === "40+";
      const isHighFit = fitness === "high";
      const isMediumFit = fitness === "medium";
      const isLowFit = fitness === "low";
      const hasClimbing = climbing === "regular" || climbing === "often";
      const hasBasicClimbing = climbing === "few";
      const hasTrade = trade === "pro" || trade === "some";

      // STRONG: Young + fit + climbing
      if (isYoung && isHighFit && hasClimbing) {
        resultStatus = "strong";
        resultTitle = "🎉 Excellent Profile!";
        resultMessage = "You've got all the pieces: youth, fitness, and climbing experience. You're ready for the pathway and have strong job prospects.";
      }
      // STRONG: Middle age + good fitness + climbing + trade
      else if (isMiddleAge && (isHighFit || isMediumFit) && hasClimbing && hasTrade) {
        resultStatus = "strong";
        resultTitle = "🎉 Well-Rounded Profile!";
        resultMessage = "You've built a solid foundation. Good fitness, climbing experience, and trade background = strong candidate.";
      }
      // STRONG: 40+ with all bases covered
      else if (isOld && isHighFit && hasClimbing && hasTrade) {
        resultStatus = "strong";
        resultTitle = "🎉 You've Got This!";
        resultMessage = "At 40+, you're defying the odds. Excellent fitness, climbing experience, and trade background make you a solid candidate despite age.";
      }
      // CAN IMPROVE: Young + fit but no climbing
      else if (isYoung && isHighFit && !hasClimbing) {
        resultStatus = "can_improve";
        resultTitle = "💪 You Can Pass - But Improve Here";
        resultMessage = "Your fitness is your strength. Add climbing experience and you'll significantly boost your job prospects.";
        legends.push({
          type: "warn",
          text: "🧗 No climbing experience yet? Rope access training covers it, but gym climbing beforehand (even 4-6 weeks) builds confidence and muscle memory. It makes a real difference."
        });
      }
      // CAN IMPROVE: Young + fit but basic climbing
      else if (isYoung && isHighFit && hasBasicClimbing) {
        resultStatus = "can_improve";
        resultTitle = "💪 You Can Pass - But Build On This";
        resultMessage = "Your fitness is solid. Your climbing is a start—push it to regular practice and you're very strong.";
        legends.push({
          type: "warn",
          text: "🧗 You've climbed a few times. Keep going—aim for gym climbing 1-2x per week for the next 6-8 weeks. Regular practice makes a huge difference on ropes."
        });
      }
      // CAN IMPROVE: Middle age + any fitness + some climbing
      else if (isMiddleAge && (hasClimbing || hasBasicClimbing)) {
        resultStatus = "can_improve";
        resultTitle = "💪 You Can Pass - But Strengthen These";
        resultMessage = "You're on track. Depending on your combination, a few specific improvements will boost your readiness.";
        if (isLowFit) {
          legends.push({
            type: "warn",
            text: "💪 Low fitness at your age: You'll need to train seriously (3x/week minimum). Squats, pull-ups, planks. Build your base before the course."
          });
        }
        if (!hasTrade) {
          legends.push({
            type: "info",
            text: "🔧 No trade background? You can learn on the job, but hiring improves significantly with construction experience. Worth considering."
          });
        }
        if (hasBasicClimbing && !hasClimbing) {
          legends.push({
            type: "info",
            text: "🧗 You've climbed a few times—keep going. Aim for gym climbing 1-2x/week for 2-3 months."
          });
        }
      }
      // 50/50: Young + no trade + low fitness + no climbing (but PR)
      else if (isYoung && trade === "none" && isLowFit && !hasClimbing) {
        resultStatus = "tight";
        resultTitle = "🟡 50/50 - Tight But Possible";
        resultMessage = "You're borderline. The good news: you've got time. One solid month of basic exercise could swing this in your favor.";
        legends.push({
          type: "warn",
          text: "💪 Try this: 1 month of basic training (planks, push-ups, squats) 3x per week. That could change everything. Come back after 4 weeks of consistent training."
        });
      }
      // 50/50: Young + no climbing + low fitness (but fitness medium+climbing helps)
      else if (isYoung && !hasClimbing && isLowFit && hasBasicClimbing) {
        resultStatus = "tight";
        resultTitle = "🟡 50/50 - Here's Your Path";
        resultMessage = "You have some climbing, but fitness is the missing piece. Address that and you're in.";
        legends.push({
          type: "warn",
          text: "💪 Your climbing background helps. Get your fitness up to medium (consistent training 2-3x/week for 6 weeks) and you'll be in a much stronger position."
        });
      }
      // 50/50: Young + no trade + medium fitness + no climbing
      else if (isYoung && trade === "none" && isMediumFit && !hasClimbing) {
        resultStatus = "tight";
        resultTitle = "🟡 50/50 - You're Close";
        resultMessage = "Your fitness is good. Add climbing experience or trade background to tip the scales.";
        legends.push({
          type: "info",
          text: "🧗 Try gym climbing for 4-6 weeks. Or look for short-term construction work. Either one significantly improves your profile."
        });
      }
      // 50/50: 30-35 + medium fitness + some climbing + no trade
      else if (age === "30-35" && isMediumFit && (hasClimbing || hasBasicClimbing) && trade === "none") {
        resultStatus = "tight";
        resultTitle = "🟡 50/50 - Develop Your Strengths";
        resultMessage = "You're balanced but not strong in any one area. Focus on fitness or trade experience.";
        legends.push({
          type: "warn",
          text: "💪 Push your fitness to 'high' with 2-3 months of consistent training, OR gain some trade/construction experience. Either one moves you from borderline to confident."
        });
      }
      // Fallback: Check if still blocked by teamwork
      if (teamwork === "alone" && resultStatus === "strong") {
        resultStatus = "team_blocker";
        resultTitle = "⚠️ Can Pass Training, Industry Needs Adjustment";
        resultMessage = "Technically you qualify, but there's a critical issue.";
      } else if (teamwork === "alone" && resultStatus === "can_improve") {
        resultStatus = "team_blocker";
        resultTitle = "⚠️ Can Pass, But Teamwork is Non-Negotiable";
        resultMessage = "Your other areas are solid, but rope access requires collaboration.";
      }

      return {
        status: resultStatus,
        title: resultTitle,
        message: resultMessage,
        breakdown,
        legends
      };
    }

    function TestModal({ onClose }) {
      const [answers, setAnswers] = useState({});
      const [result, setResult] = useState(null);

      const answered = Object.keys(answers).length;
      const allAnswered = questions.every(q => answers[q.id]);
      const progress = (answered / questions.length) * 100;

      const handleAnswer = (questionId, value) => {
        setAnswers(prev => ({ ...prev, [questionId]: value }));
      };

      const handleSubmit = () => {
        const evaluation = evaluateProfile(answers);
        setResult(evaluation);
      };

      const handleReset = () => {
        setAnswers({});
        setResult(null);
      };

      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <div>
                <small>Eligibility Assessment</small>
                <h2>Dual Qualification Pathway</h2>
              </div>
              <button className="close" onClick={onClose}>×</button>
            </div>

            <div className="modal-body">
              {!result ? (
                <>
                  <div className="progress"><div style={{ width: progress + "%" }}></div></div>
                  <p style={{ color: "var(--dim)", fontSize: 13, textAlign: "center", marginBottom: 20 }}>
                    Answer honestly. This takes 2 minutes.
                  </p>

                  {questions.map(q => (
                    <div className="question" key={q.id}>
                      <h3>{q.emoji} {q.text}</h3>
                      <div className="options">
                        {q.options.map(opt => (
                          <button
                            key={opt[1]}
                            className={"option " + (answers[q.id] === opt[1] ? "selected" : "")}
                            onClick={() => handleAnswer(q.id, opt[1])}
                          >
                            {answers[q.id] === opt[1] ? "✓ " : ""}{opt[0]}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}

                  <button
                    className="btn primary"
                    style={{ width: "100%", padding: 14, marginTop: 24, opacity: allAnswered ? 1 : 0.4, cursor: allAnswered ? "pointer" : "not-allowed" }}
                    disabled={!allAnswered}
                    onClick={handleSubmit}
                  >
                    See My Assessment
                  </button>
                </>
              ) : (
                <div className="result">
                  <div className="result-icon">
                    {result.status === "blocked" ? "🚫" : result.status === "team_blocker" ? "⚠️" : result.status === "tight" ? "🟡" : result.status === "can_improve" ? "💪" : "🎉"}
                  </div>
                  <h2 style={{
                    color: result.status === "blocked" ? "var(--danger)" : result.status === "team_blocker" ? "var(--warn)" : result.status === "tight" ? "var(--warn)" : result.status === "can_improve" ? "var(--accent)" : "var(--success)"
                  }}>
                    {result.title}
                  </h2>
                  <p>{result.message}</p>

                  <div className="breakdown">
                    {Object.values(result.breakdown).map((item, i) => (
                      <div className="breakdown-row" key={i}>
                        <span className="breakdown-label">
                          {item.status} <strong>{item.label}</strong>
                        </span>
                      </div>
                    ))}
                  </div>

                  {result.legends.map((leg, i) => (
                    <div key={i} className={`legend ${leg.type}`}>{leg.text}</div>
                  ))}

                  {(result.status !== "blocked") && (
                    <div className="contact-block">
                      <p>Ready to take the next step?</p>
                      <p style={{ marginBottom: 0 }}>Contact Vertical Horizonz directly:</p>
                      <div className="contact-email">hello@verticalhorizonz.co.nz</div>
                    </div>
                  )}

                  <div className="btn-group">
                    <button className="btn secondary" onClick={handleReset}>Retake Assessment</button>
                    <button className="btn primary" onClick={onClose}>Close</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Landing() {
      const [showTest, setShowTest] = useState(false);

      return (
        <div className="app">
          <header className="header">
            <div className="logo">VH</div>
            <div>
              <h1>Vertical Horizonz</h1>
